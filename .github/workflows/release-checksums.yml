name: Release Checksums (SHA-256 + Sigstore signature)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach checksums to"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  checksums:
    name: Compute and sign dataset checksums
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p release-assets
          cd release-assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --skip-existing || true
          ls -la

      - name: Compute SHA-256 checksums for release assets
        working-directory: release-assets
        run: |
          if [ -z "$(ls -A . 2>/dev/null)" ]; then
            echo "No release assets - skipping checksums." >&2
            exit 0
          fi
          # Exclude the signature and certificate we are about to produce
          find . -maxdepth 1 -type f \
            ! -name SHA256SUMS \
            ! -name SHA256SUMS.sig \
            ! -name SHA256SUMS.pem \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Sign SHA256SUMS (keyless, OIDC -> Sigstore)
        working-directory: release-assets
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          if [ ! -f SHA256SUMS ]; then
            echo "No SHA256SUMS to sign." >&2
            exit 0
          fi
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Upload checksums + signature to the release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        working-directory: release-assets
        run: |
          for f in SHA256SUMS SHA256SUMS.sig SHA256SUMS.pem; do
            if [ -f "$f" ]; then
              gh release upload "$TAG" "$f" \
                --repo "${{ github.repository }}" --clobber
            fi
          done

      - name: Write verification snippet (for release notes)
        run: |
          cat <<'EOF'
          Verify the release:

            # 1. Download SHA256SUMS, SHA256SUMS.sig, SHA256SUMS.pem
            # 2. Verify the signature:
            cosign verify-blob \
              --certificate SHA256SUMS.pem \
              --signature SHA256SUMS.sig \
              --certificate-identity-regexp 'https://github.com/datadrivenconstruction/OpenConstructionEstimate-DDC-CWICR/.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              SHA256SUMS

            # 3. Verify your downloaded files match:
            sha256sum -c SHA256SUMS

          EOF
